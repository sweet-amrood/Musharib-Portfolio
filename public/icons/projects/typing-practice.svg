<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Typing Practice">
  <defs>
    <linearGradient id="typing-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#B265FF"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#typing-bg)"/>
  <!-- keyboard -->
  <rect x="12" y="28" width="40" height="22" rx="4" fill="#fff"/>
  <rect x="15" y="31" width="5" height="4" rx="1" fill="#0ea5e9" opacity=".5"/>
  <rect x="22" y="31" width="5" height="4" rx="1" fill="#0ea5e9" opacity=".5"/>
  <rect x="29" y="31" width="5" height="4" rx="1" fill="#0ea5e9" opacity=".5"/>
  <rect x="36" y="31" width="5" height="4" rx="1" fill="#0ea5e9" opacity=".5"/>
  <rect x="43" y="31" width="5" height="4" rx="1" fill="#0ea5e9" opacity=".5"/>
  <rect x="18" y="38" width="28" height="4" rx="1" fill="#0ea5e9" opacity=".35"/>
  <rect x="20" y="44" width="24" height="3" rx="1" fill="#0ea5e9" opacity=".25"/>
  <!-- typing text lines -->
  <rect x="16" y="14" width="22" height="3" rx="1.5" fill="#fff" opacity=".9"/>
  <rect x="16" y="20" width="32" height="3" rx="1.5" fill="#fff" opacity=".7"/>
  <!-- cursor -->
  <rect x="50" y="20" width="2" height="8" rx="1" fill="#FFA100"/>
</svg>
